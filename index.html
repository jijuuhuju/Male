<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>ミニポータル</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 320px; margin: 10px auto; display: none; }
        .active { display: block; }
        input, textarea { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 6px; }
        .btn { width: 100%; padding: 10px; border: none; background: #1890ff; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .nav { display: flex; justify-content: space-around; width: 320px; margin: 0 auto 10px; background: white; padding: 8px; border-radius: 8px; }
        .nav span { cursor: pointer; font-size: 20px; }
        .mail { border-bottom: 1px dashed #eee; padding: 8px 0; text-align: left; font-size: 13px; }
    </style>
</head>
<body>
    <div id="nav" class="nav" style="display:none;"><span onclick="go('p-mail')">📬</span><span onclick="go('p-game')">🎮</span><span onclick="go('p-save')">⚙️</span></div>

    <!-- 1. 登録画面 -->
    <div id="p-reg" class="card active">
        <h3>アカウント作成</h3>
        <input type="text" id="name" placeholder="ユーザー名">
        <textarea id="desc" placeholder="自己紹介" rows="2"></textarea>
        <label><input type="checkbox" id="chk" style="width:auto;"> 更新状況をメールで受け取る</label><br><br>
        <button class="btn" onclick="reg()">新規作成してスタート</button>
        <button class="btn" style="background:#faad14" onclick="load()">セーブコードから復元</button>
        <textarea id="code-in" placeholder="コードをここに貼り付け" rows="2" style="margin-top:10px;"></textarea>
    </div>

    <!-- 2. メール画面 -->
    <div id="p-mail" class="card">
        <h3>メール（受信: <span id="count">0</span>）</h3>
        <div id="m-box" style="max-height:150px; overflow-y:auto; margin-bottom:10px;"></div>
        <input type="text" id="m-title" placeholder="件名">
        <textarea id="m-body" placeholder="本文" rows="2"></textarea>
        <button class="btn" onclick="send()">メール送信</button>
    </div>

    <!-- 3. ゲーム・ランキング画面 -->
    <div id="p-game" class="card">
        <h3>連打ゲーム & ランキング</h3>
        <p>スコア: <span id="score">0</span> / ベスト: <span id="best">0</span></p>
        <button class="btn" style="background:#52c41a; height:60px;" onclick="tap()">ココを連打！</button>
        <div id="rank" style="text-align:left; font-size:14px; margin-top:10px; line-height:1.6;"></div>
    </div>

    <!-- 4. セーブ画面 -->
    <div id="p-save" class="card">
        <h3>セーブコード出力</h3>
        <textarea id="code-out" readonly onclick="this.select()" rows="4"></textarea>
        <button class="btn" style="background:#52c41a" onclick="save()">コードを生成</button>
        <button class="btn" style="background:#ff4d4f" onclick="location.reload()">ログアウト</button>
    </div>

<script>
    let d = { name:"", desc:"", chk:false, high:0, mails:[{t:"サイトへようこそ！", b:"メールボックスが開通しました。"}] };
    let score = 0, timer = null;

    function go(id) { document.querySelectorAll('.card').forEach(c=>c.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='p-game') showRank(); }
    function reg() { d.name=document.getElementById('name').value; d.desc=document.getElementById('desc').value; d.chk=document.getElementById('chk').checked; if(!d.name)return alert("名前入力必須"); if(d.chk) d.mails.unshift({t:"【更新】メルマガ",b:"受信設定完了！"}); login(); }
    function login() { document.getElementById('nav').style.display='flex'; document.getElementById('best').innerText=d.high; showMails(); go('p-mail'); }
    function showMails() { let b=document.getElementById('m-box'); b.innerHTML=""; d.mails.forEach(m=>b.innerHTML+=`<div class="mail"><b>${m.t}</b><br>${m.b}</div>`); document.getElementById('count').innerText=d.mails.length; }
    function send() { let t=document.getElementById('m-title').value, b=document.getElementById('m-body').value; if(!t||!b)return; d.mails.unshift({t:"[送信済] "+t, b:b}); document.getElementById('m-title').value=""; document.getElementById('m-body').value=""; showMails(); }
    function tap() { if(!timer){ score=0; timer=setTimeout(()=>{ if(score>d.high)d.high=score; d.high=Math.max(d.high,score); document.getElementById('best').innerText=d.high; timer=null; alert("終了！スコア:"+score); },3000); } score++; document.getElementById('score').innerText=score; }
    function showRank() { let r=document.getElementById('rank'); r.innerHTML=`🏆 ランキング<br>1位: プロ(45点)<br>2位: ${d.name}(${d.high}点)<br>3位: 一般人(5点)`; }
    function save() { document.getElementById('code-out').value = btoa(unescape(encodeURIComponent(JSON.stringify(d)))); alert("コードをコピーして保存してください"); }
    function load() { try { d=JSON.parse(decodeURIComponent(escape(atob(document.getElementById('code-in').value)))); login(); }catch(e){ alert("不正なコードです"); } }
</script>
</body>
</html>
